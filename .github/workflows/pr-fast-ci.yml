name: PR Fast CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: '20'

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v3 pinned 2026-04-19
        id: filter
        with:
          filters: |
            app:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - '.github/PULL_REQUEST_TEMPLATE.md'
              - '.devcontainer/**'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'docs/bootstrap/**'
              - 'README.md'
              - 'docs/**'
              - 'stage1/**'
              - 'Makefile'
            ci:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - '.github/PULL_REQUEST_TEMPLATE.md'
              - '.devcontainer/**'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'docs/bootstrap/**'
              - '.env.example'
              - 'CODEOWNERS'
              - 'Makefile'
              - '.github/dependabot.yml'

  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: >-
      github.event.pull_request.draft == false &&
      (needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19

      - name: Run fast checks
        run: bash scripts/ci/run-fast-checks.sh

  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Scan repository for secret patterns
        run: bash scripts/check-detect-secrets.sh --all-files

  validate-pr-description:
    name: Validate PR Description
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false
    env:
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - name: Require generated PR template content
        run: |
          failed=0

          require_line() {
            local line="$1"
            if ! grep -Fqx "$line" <<<"$PR_BODY"; then
              echo "Missing required PR section: $line"
              failed=1
            fi
          }

          has_structured_sections=1
          for section in \
            "## Summary" \
            "## Governing Issue" \
            "## Validation" \
            "## Bootstrap Governance" \
            "## Notes"; do
            if ! grep -Fqx "$section" <<<"$PR_BODY"; then
              has_structured_sections=0
              break
            fi
          done

          issue_link_regex='(^|[[:space:]-])((close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+|no issue is linked|no linked issue|without a linked issue|no governing issue)'
          validation_regex='(^|[[:space:]-])(\[[xX]\]|not run|not applicable|n/a)'

          if (( has_structured_sections )); then
            require_line "## Summary"
            require_line "## Governing Issue"
            require_line "## Validation"
            require_line "## Bootstrap Governance"
            require_line "## Notes"

            if grep -Eiq 'Closes #[[:space:]]*$|#<issue-number>|what changed|why it changed|notable tradeoffs|migration or rollout notes|follow-up work if any' <<<"$PR_BODY"; then
              echo "PR body still contains template placeholder text."
              failed=1
            fi

            if ! grep -Eiq "$issue_link_regex" <<<"$PR_BODY"; then
              echo "PR body must close/link an issue or explicitly explain why no issue is linked."
              failed=1
            fi

            if ! grep -Eiq "$validation_regex" <<<"$PR_BODY"; then
              echo "PR body must include validation evidence, a checked validation item, or a reason validation was not run."
              failed=1
            fi
          else
            echo "PR body does not use the structured template yet; applying legacy fallback validation."

            if grep -Eiq 'Closes #[[:space:]]*$|#<issue-number>' <<<"$PR_BODY"; then
              echo "PR body still contains template placeholder text."
              failed=1
            fi

            if ! grep -Eiq "$issue_link_regex" <<<"$PR_BODY"; then
              echo "Legacy PR body must still close/link an issue or explicitly explain why no issue is linked."
              failed=1
            fi

            prose_lines=$(printf '%s\n' "$PR_BODY" | grep -Evi '^[[:space:]]*$|^[[:space:]]*(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+[[:space:]]*$' | wc -l | tr -d ' ')
            if (( prose_lines == 0 )); then
              echo "Legacy PR body must include a short prose summary in addition to the issue link."
              failed=1
            fi
          fi

          exit "$failed"

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - fast-checks
      - validate-pr-description
      - validate-secrets
    steps:
      - name: Check required PR jobs
        env:
          RESULTS: >-
            changes=${{ needs.changes.result }}
            fast-checks=${{ needs.fast-checks.result }}
            validate-pr-description=${{ needs.validate-pr-description.result }}
            validate-secrets=${{ needs.validate-secrets.result }}
        run: |
          failed=0
          for entry in $RESULTS; do
            job="${entry%%=*}"
            status="${entry##*=}"
            if [[ "$status" == "success" || "$status" == "skipped" ]]; then
              echo "OK   $job => $status"
            else
              echo "FAIL $job => $status"
              failed=1
            fi
          done
          exit "$failed"
