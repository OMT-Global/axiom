name: PR Fast CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3 pinned 2026-05-30
        id: filter
        with:
          filters: |
            app:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CONTRIBUTING.md'
              - '.github/PULL_REQUEST_TEMPLATE.md'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'stage1/**'
              - 'docs/bootstrap/**'
              - 'README.md'
              - 'docs/**'
            ci:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CONTRIBUTING.md'
              - '.github/PULL_REQUEST_TEMPLATE.md'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'stage1/**'
              - 'docs/bootstrap/**'
              - '.env.example'
              - 'CODEOWNERS'

  fast-checks:
    name: Fast Checks
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    timeout-minutes: 90
    needs: changes
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true')
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 pinned 2026-05-30
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19

      - name: Run fast checks
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/ci/run-fast-checks.sh

  validate-pr-description:
    name: Validate PR Description
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    timeout-minutes: 5
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
    steps:
      - name: Require generated PR template content
        # Keep this validation inline in the trusted workflow. The job runs for
        # pull_request events on a self-hosted public runner, so it must not
        # check out or execute scripts from the untrusted pull request head.
        run: |
          set -euo pipefail

          pr_body="${PR_BODY:-}"
          failed=0

          if [[ "${PR_AUTHOR:-}" == "dependabot[bot]" ]] && grep -Eq '^Bumps \[[^]]+\]\([^)]+\) from [^[:space:]]+ to [^[:space:]]+\.' <<<"$pr_body"; then
            echo "Dependabot PR body detected; accepting generated dependency update summary."
            exit 0
          fi

          require_line() {
            local line="$1"
            if ! grep -Fqx "$line" <<<"$pr_body"; then
              echo "Missing required PR section: $line"
              failed=1
            fi
          }

          has_structured_sections=1
          for section in \
            "## Summary" \
            "## Governing Issue" \
            "## Validation" \
            "## Bootstrap Governance" \
            "## Notes"; do
            if ! grep -Fqx "$section" <<<"$pr_body"; then
              has_structured_sections=0
              break
            fi
          done

          issue_ref_regex='([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)?#[0-9]+'
          issue_url_regex='https://github\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/issues/[0-9]+'
          issue_link_regex="(^|[[:space:]-])(((close[sd]?|fix(e[sd])?|resolve[sd]?|refs?)|part[[:space:]]+of)[[:space:]]+(${issue_ref_regex}|${issue_url_regex})|${issue_ref_regex}|${issue_url_regex}|no issue is linked|no linked issue|without a linked issue|no governing issue)"
          validation_regex='(^|[[:space:]-])(\[[xX]\]|not run|not applicable|n/a)'

          if (( has_structured_sections )); then
            require_line "## Summary"
            require_line "## Governing Issue"
            require_line "## Validation"
            require_line "## Bootstrap Governance"
            require_line "## Notes"

            if grep -Eiq 'Closes[[:space:]]+(owner/repo#<issue-number>|#[[:space:]]*$|[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+#[[:space:]]*$)|#<issue-number>|what changed|why it changed|notable tradeoffs|migration or rollout notes|follow-up work if any' <<<"$pr_body"; then
              echo "PR body still contains template placeholder text."
              failed=1
            fi

            if ! grep -Eiq "$issue_link_regex" <<<"$pr_body"; then
              echo "PR body must close/link an issue or explicitly explain why no issue is linked."
              failed=1
            fi

            if ! grep -Eiq "$validation_regex" <<<"$pr_body"; then
              echo "PR body must include validation evidence, a checked validation item, or a reason validation was not run."
              failed=1
            fi
          else
            echo "PR body does not use the structured template yet; applying legacy fallback validation."

            if grep -Eiq 'Closes[[:space:]]+(owner/repo#<issue-number>|#[[:space:]]*$|[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+#[[:space:]]*$)|#<issue-number>' <<<"$pr_body"; then
              echo "PR body still contains template placeholder text."
              failed=1
            fi

            if ! grep -Eiq "$issue_link_regex" <<<"$pr_body"; then
              echo "Legacy PR body must still close/link an issue or explicitly explain why no issue is linked."
              failed=1
            fi

            prose_lines=$(printf '%s\n' "$pr_body" | awk 'BEGIN { count = 0 } { lower = tolower($0) } !match(lower, /^[[:space:]]*$/) && !match(lower, /^[[:space:]]*(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+(([[:alnum:]_.-]+\/[[:alnum:]_.-]+)?#[0-9]+|https:\/\/github\.com\/[[:alnum:]_.-]+\/[[:alnum:]_.-]+\/issues\/[0-9]+)[[:space:]]*$/) { count++ } END { print count }')
            if (( prose_lines == 0 )); then
              echo "Legacy PR body must include a short prose summary in addition to the issue link."
              failed=1
            fi
          fi

          exit "$failed"


  validate-secrets:
    name: Validate Secrets
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    timeout-minutes: 10
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 pinned 2026-05-30
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Scan repository for secret patterns
        run: bash scripts/check-detect-secrets.sh --all-files

  ci-gate:
    name: CI Gate
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    if: always()
    needs:
      - changes
      - fast-checks
      - validate-pr-description
      - validate-secrets
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 pinned 2026-05-30
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Validate fork PR description from trusted base
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: bash scripts/ci/validate-pr-description.sh
      - name: Check required PR jobs
        env:
          RESULTS: >-
            changes=${{ needs.changes.result }}
            fast-checks=${{ needs.fast-checks.result }}
            validate-pr-description=${{ needs.validate-pr-description.result }}
            validate-secrets=${{ needs.validate-secrets.result }}
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          TRUSTED_FORK_PR_DESCRIPTION_VALIDATED: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: bash scripts/ci/check-pr-fast-ci-gate.sh
