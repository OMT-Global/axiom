name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test_stage1_hosted:
    name: test (stage1 rust hosted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned 2026-04-19
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19
      - name: Run stage1 crate tests
        run: make stage1-test
      - name: Run stage1 conformance tests
        run: make stage1-conformance
      - name: Run stage1 smoke tests
        run: make stage1-smoke
