name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test_pr_py312_hosted:
    name: test (python 3.12 self-hosted)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned 2026-04-19
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6 pinned 2026-04-19
        with:
          python-version: "3.12"
      - name: Run tests
        run: python -m unittest discover -v

  test_self_hosted_py312_trusted:
    name: test (python 3.12 self-hosted)
    if: github.event_name != 'pull_request'
    runs-on:
      - self-hosted
      - synology
      - shell-only
      - public
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned 2026-04-19
      - name: Verify Python 3.12
        run: python3.12 --version
      - name: Run tests
        run: python3.12 -m unittest discover -v

  test_hosted_matrix_trusted:
    name: test (python ${{ matrix.python-version }} hosted)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned 2026-04-19
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6 pinned 2026-04-19
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -m unittest discover -v

  test_hosted_matrix_fork_pr:
    name: test (python ${{ matrix.python-version }} hosted)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned 2026-04-19
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6 pinned 2026-04-19
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -m unittest discover -v

  test_stage1_hosted:
    name: test (stage1 rust hosted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned 2026-04-19
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19
      - name: Run stage1 crate tests
        run: make stage1-test
      - name: Run stage1 smoke tests
        run: make stage1-smoke
