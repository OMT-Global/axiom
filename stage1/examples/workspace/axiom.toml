[package]
name = "workspace-stage1"
version = "0.1.0"

[build]
entry = "src/main.ax"
out_dir = "dist"

[capabilities]
fs = false
net = false
process = false
env = false
clock = false
crypto = false

[workspace]
members = ["members/core", "members/util"]

[dependencies]
core = { path = "members/core" }
