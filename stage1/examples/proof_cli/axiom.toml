[package]
name = "proof-cli"
version = "0.1.0"

[workspace]
members = ["deps/core"]

[dependencies]
core = { path = "deps/core" }

[build]
entry = "src/main.ax"
out_dir = "dist"

[capabilities]
fs = false
net = false
process = false
env = ["__AXIOM_PROOF_CLI_MODE__"]
clock = false
crypto = false
ffi = false
